#
# Vhost Nginx pour LLMUI Core — prêt à copier dans sites-available/
# Remplacer : DOMAIN, APP_PORT (défaut 8004)
#
# Usage :
#   cp nginx_vhost.conf /etc/nginx/sites-available/llmui-core
#   ln -s /etc/nginx/sites-available/llmui-core /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # En-têtes de sécurité obligatoires (STANDARDS.md §6)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self';" always;

    # Logs
    access_log /var/log/nginx/llmui-core.access.log;
    error_log  /var/log/nginx/llmui-core.error.log;

    # Limite upload (fichiers soumis au backend)
    client_max_body_size 25M;

    # Frontend statique (web/)
    location /static/ {
        alias /opt/llmui-core/app/web/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Assets images
    location /images/ {
        alias /opt/llmui-core/app/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API backend (FastAPI sur APP_PORT)
    location /api/ {
        proxy_pass         http://127.0.0.1:APP_PORT;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:APP_PORT;
    }

    # Panneau /zadmin (protégé — TOTP obligatoire en production)
    location /zadmin {
        proxy_pass         http://127.0.0.1:APP_PORT;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Application principale (SPA fallback)
    location / {
        proxy_pass         http://127.0.0.1:APP_PORT;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
