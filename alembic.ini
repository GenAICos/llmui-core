# Alembic — LLMUI Core
# Copyright © Technologies Nexios TF Inc. — nexiostf.com
#
# L'URL de connexion N'EST PAS définie ici : elle provient de DATABASE_URL
# (.env, STANDARDS.md §2), résolue par alembic/env.py.

[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url : volontairement vide — fourni par env.py depuis DATABASE_URL.

[post_write_hooks]
# Formatage automatique des migrations générées (STANDARDS.md §10 — ruff).
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
