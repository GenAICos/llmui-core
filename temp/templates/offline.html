<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors ligne — FinanceFamille</title>
  <link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">
  <link rel="stylesheet" href="/static/css/style.css">
  <script>(function(){var t=localStorage.getItem("financefamille_theme")||"dark";document.documentElement.setAttribute("data-theme",t);})();</script>
  <style>
    .offline-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      gap: 1.5rem;
    }
    .offline-icon {
      font-size: 4rem;
      opacity: 0.6;
    }
    .offline-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary, #f1f5f9);
      margin: 0;
    }
    .offline-subtitle {
      font-size: 1rem;
      color: var(--text-secondary, #94a3b8);
      max-width: 360px;
      line-height: 1.6;
      margin: 0;
    }
    .offline-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }
    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--accent, #3b82f6);
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-retry:hover { opacity: 0.85; }
    .btn-dashboard {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--card-bg, #1e293b);
      color: var(--text-primary, #f1f5f9);
      border: 1px solid var(--border, #334155);
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-dashboard:hover { opacity: 0.8; }
    .offline-tip {
      font-size: 0.8rem;
      color: var(--text-muted, #64748b);
      max-width: 320px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1 class="offline-title">Vous êtes hors ligne</h1>
    <p class="offline-subtitle">
      FinanceFamille ne peut pas se connecter au serveur pour le moment.
      Vérifiez votre connexion internet et réessayez.
    </p>
    <div class="offline-actions">
      <button class="btn-retry" onclick="window.location.reload()">
        ↺ Réessayer
      </button>
      <a class="btn-dashboard" href="/dashboard">
        Tableau de bord (cache)
      </a>
    </div>
    <p class="offline-tip">
      Les pages visitées récemment sont disponibles hors ligne grâce au cache de l'application.
    </p>
  </div>
</body>
</html>
