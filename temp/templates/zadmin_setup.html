<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuration initiale — FinanceFamille</title>
  <link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
  <link rel="stylesheet" href="/static/css/style.css">
  <script>(function(){var t=localStorage.getItem("financefamille_theme")||"dark";document.documentElement.setAttribute("data-theme",t);})();</script>
</head>
<body style="background:var(--bg-primary);padding:2rem">
<div style="max-width:600px;margin:0 auto">

  <div style="text-align:center;margin-bottom:2rem">
    <h1 style="background:linear-gradient(135deg,#F59E0B,#EF4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:2rem">
      ⚙ Zadmin
    </h1>
    <p class="text-muted">Configuration initiale de FinanceFamille</p>
    <p class="text-amber" style="margin-top:0.5rem;font-size:0.85rem">
      Cette page est uniquement accessible lors du premier démarrage.
    </p>
  </div>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/zadmin/setup">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <!-- Compte administrateur zadmin -->
    <div class="card mb-2">
      <h3 style="margin-bottom:1rem;color:var(--accent-amber)">🔐 Compte administrateur</h3>
      <div class="form-group">
        <label>Nom d'utilisateur (min. 3 caractères)</label>
        <input type="text" name="admin_username" required minlength="3" value="admin" placeholder="admin" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Mot de passe (min. 8 caractères)</label>
        <input type="password" name="admin_password" required minlength="8" placeholder="••••••••••••" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" name="admin_password2" required minlength="8" placeholder="••••••••••••" autocomplete="new-password">
      </div>
    </div>

    <!-- SMTP -->
    <div class="card mb-2">
      <h3 style="margin-bottom:1rem;color:var(--accent-blue)">📧 Configuration email (optionnel)</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group">
          <label>Serveur SMTP</label>
          <input type="text" name="smtp_host" placeholder="smtp.example.com">
        </div>
        <div class="form-group">
          <label>Port SMTP</label>
          <input type="number" name="smtp_port" value="587" min="1" max="65535">
        </div>
        <div class="form-group">
          <label>Utilisateur SMTP</label>
          <input type="email" name="smtp_user" placeholder="financefamille@example.com">
        </div>
        <div class="form-group">
          <label>Mot de passe SMTP</label>
          <input type="password" name="smtp_pass" placeholder="••••••••">
        </div>
      </div>
      <div class="form-group">
        <label>Expéditeur (From)</label>
        <input type="text" name="smtp_from" placeholder="FinanceFamille &lt;financefamille@example.com&gt;">
      </div>
    </div>

    <!-- Devise -->
    <div class="card mb-2">
      <h3 style="margin-bottom:1rem;color:var(--accent-green)">💰 Devise</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group">
          <label>Code devise</label>
          <input type="text" name="currency" value="CAD" maxlength="10" placeholder="CAD">
        </div>
        <div class="form-group">
          <label>Symbole</label>
          <input type="text" name="currency_symbol" value="$" maxlength="5" placeholder="$">
        </div>
      </div>
    </div>

    <button type="submit" class="btn btn-warning" style="width:100%;padding:0.85rem;font-size:1rem">
      ✓ Terminer la configuration
    </button>
  </form>

  <div class="footer" style="border:none;margin-top:1.5rem">
    <a href="https://nexiostf.com" target="_blank" rel="noopener">Technologies Nexios TF Inc.</a>
  </div>
</div>
</body>
</html>
