{% extends "base.html" %}
{% block title %}Vérification 2FA — {{ app_name }}{% endblock %}
{% block body %}
<div class="login-page" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem">
  <div class="card" style="width:100%;max-width:420px;padding:2.5rem">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-size:2.5rem;margin-bottom:0.5rem">🔐</div>
      <h1 style="font-size:1.4rem;font-weight:800;margin-bottom:0.25rem">Vérification à deux facteurs</h1>
      <p class="text-muted" style="font-size:0.9rem">
        Entrez le code de votre application TOTP (Google Authenticator, Authy…).
      </p>
    </div>

    {% if error %}
    <div class="alert alert-error" style="margin-bottom:1.25rem">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login/2fa" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="form-group" style="margin-bottom:1.5rem">
        <label style="font-weight:600">Code à 6 chiffres</label>
        <input type="text" name="totp_code" inputmode="numeric" pattern="[0-9]{6}"
               maxlength="6" placeholder="123456" autofocus autocomplete="one-time-code"
               required
               style="font-size:1.6rem;letter-spacing:0.4rem;text-align:center;width:100%">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Vérifier →</button>
    </form>

    <p style="text-align:center;margin-top:1.25rem;font-size:0.85rem">
      <a href="/login" class="text-muted">← Retour à la connexion</a>
    </p>
  </div>
</div>
{% endblock %}
