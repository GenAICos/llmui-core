<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zadmin — Connexion</title>
  <link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
  <link rel="stylesheet" href="/static/css/style.css">
  <script>(function(){var t=localStorage.getItem("financefamille_theme")||"dark";document.documentElement.setAttribute("data-theme",t);})();</script>
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <h1 style="background:linear-gradient(135deg,#F59E0B,#EF4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">
        ⚙ Zadmin
      </h1>
      <p>Administration — FinanceFamille</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/zadmin/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" name="username" placeholder="admin" required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" name="admin_password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-warning" style="width:100%;margin-top:0.5rem">
        Accéder au zadmin
      </button>
    </form>

    <div style="margin-top:1rem;text-align:center">
      <a href="/" class="btn btn-ghost btn-sm">← Retour à l'app</a>
    </div>

    <div class="footer" style="border:none;margin-top:1.5rem">
      <a href="https://nexiostf.com" target="_blank" rel="noopener">Technologies Nexios TF Inc.</a>
    </div>
  </div>
</div>
</body>
</html>
