<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="signup.title">Créer un compte — {{ app_name }}</title>
  <link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
  <link rel="stylesheet" href="/static/css/style.css">
  <script>(function(){var t=localStorage.getItem("financefamille_theme")||"dark";document.documentElement.setAttribute("data-theme",t);})();</script>
</head>
<body>
<div class="login-page">
  <div class="login-box" style="max-width:520px">

    {% include "partials/lang_switcher.html" %}

    <div class="login-logo">
      <img src="/static/img/logo.png" alt="{{ app_name }}" class="app-logo"
           onerror="this.style.display='none';document.getElementById('app-name-fallback').style.display='block'">
      <h1 id="app-name-fallback" style="display:none">{{ app_name }}</h1>
      <p data-i18n="signup.subtitle">Gestionnaire de budget familial</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/signup" autocomplete="on" novalidate id="signup-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input type="hidden" name="plan" id="plan-hidden" value="{{ plan or 'trial' }}">

      <!-- ── Choix du plan ────────────────────────────────── -->
      <div class="plan-picker" style="margin-bottom:1.5rem">
        <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em">
          Choisissez votre formule
        </p>
        <div class="plan-cards">

          <!-- Trial -->
          <label class="plan-card {% if not plan or plan == 'trial' %}selected{% endif %}" data-plan="trial">
            <input type="radio" name="_plan_radio" value="trial" {% if not plan or plan == 'trial' %}checked{% endif %} style="display:none">
            <div class="plan-card-header">
              <span class="plan-card-name">🧪 Essai gratuit</span>
            </div>
            <div class="plan-card-price">Gratuit</div>
            <div class="plan-card-desc">{{ essai_jours }} jours — aucune carte requise</div>
          </label>

          <!-- Mensuel -->
          <label class="plan-card {% if plan == 'mensuel' %}selected{% endif %} {% if not stripe_configured %}plan-card-disabled{% endif %}" data-plan="mensuel">
            <input type="radio" name="_plan_radio" value="mensuel" {% if plan == 'mensuel' %}checked{% endif %} {% if not stripe_configured %}disabled{% endif %} style="display:none">
            <div class="plan-card-header">
              <span class="plan-card-name">📅 Mensuel</span>
            </div>
            <div class="plan-card-price">{{ currency_symbol }}{{ prix_mensuel }}<span style="font-size:0.72rem;font-weight:400">/mois</span></div>
            <div class="plan-card-desc">Annulable à tout moment</div>
            {% if not stripe_configured %}<div class="plan-card-badge">Bientôt disponible</div>{% endif %}
          </label>

          <!-- Annuel -->
          <label class="plan-card {% if plan == 'annuel' %}selected{% endif %} {% if not stripe_configured %}plan-card-disabled{% endif %}" data-plan="annuel">
            <input type="radio" name="_plan_radio" value="annuel" {% if plan == 'annuel' %}checked{% endif %} {% if not stripe_configured %}disabled{% endif %} style="display:none">
            <div class="plan-card-header">
              <span class="plan-card-name">🏆 Annuel</span>
              <span class="plan-card-best">Meilleur prix</span>
            </div>
            <div class="plan-card-price">{{ currency_symbol }}{{ prix_annuel }}<span style="font-size:0.72rem;font-weight:400">/an</span></div>
            <div class="plan-card-desc">Économisez vs mensuel</div>
            {% if not stripe_configured %}<div class="plan-card-badge">Bientôt disponible</div>{% endif %}
          </label>

        </div>
      </div>

      <!-- ── Champs du compte ─────────────────────────────── -->
      <div class="form-group">
        <label for="nom_famille" data-i18n="signup.nom_famille">Nom de la famille</label>
        <input type="text" id="nom_famille" name="nom_famille"
               value="{{ nom_famille or '' }}"
               placeholder="Famille Tremblay"
               maxlength="100" required autofocus
               autocomplete="family-name">
      </div>

      <div class="form-group">
        <label for="username" data-i18n="signup.username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username"
               value="{{ username or '' }}"
               placeholder="parent_tremblay"
               pattern="[a-zA-Z0-9_\-]+" minlength="3" maxlength="50" required
               autocomplete="username">
        <small class="text-muted" style="font-size:0.75rem" data-i18n="signup.username_hint">
          Lettres, chiffres, - et _ uniquement (3–50 caractères)
        </small>
      </div>

      <div class="form-group">
        <label for="email" data-i18n="signup.email">Courriel</label>
        <input type="email" id="email" name="email"
               value="{{ email or '' }}"
               placeholder="famille@exemple.com"
               maxlength="255" required
               autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password" data-i18n="signup.password">Mot de passe</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••"
               minlength="8" required
               autocomplete="new-password">
        <small class="text-muted" style="font-size:0.75rem" data-i18n="signup.password_hint">
          Minimum 8 caractères
        </small>
      </div>

      <div class="form-group">
        <label for="password2" data-i18n="signup.password2">Confirmer le mot de passe</label>
        <input type="password" id="password2" name="password2"
               placeholder="••••••••"
               minlength="8" required
               autocomplete="new-password">
      </div>

      <div class="form-group">
        <label style="display:flex;align-items:flex-start;gap:0.6rem;font-weight:400;cursor:pointer">
          <input type="checkbox" name="accept_cgu" id="accept_cgu" value="1"
                 {% if accept_cgu %}checked{% endif %} required
                 style="margin-top:0.2rem;width:auto">
          <span>
            <span data-i18n="signup.accept_intro">J'ai lu et j'accepte les</span>
            <a href="/cgu" target="_blank" rel="noopener" data-i18n="signup.accept_terms_link">Conditions Générales d'Utilisation</a>
            <span data-i18n="signup.accept_middle">et la</span>
            <a href="/confidentialite" target="_blank" rel="noopener" data-i18n="signup.accept_privacy_link">Politique de confidentialité</a><span data-i18n="signup.accept_outro">.</span>
          </span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary" id="submit-btn"
              style="width:100%;margin-top:0.75rem;padding:0.85rem;font-size:1rem"
              data-i18n="signup.submit">
        Créer mon compte
      </button>
    </form>

    <div style="text-align:center;margin-top:1.25rem;font-size:0.9rem">
      <span class="text-muted" data-i18n="signup.login_prompt">Déjà un compte ?</span>
      <a href="/login" data-i18n="signup.login_link">Se connecter</a>
    </div>

    <div class="footer" style="margin-top:1.5rem;border:none">
      <a href="https://nexiostf.com" target="_blank" rel="noopener">
        Technologies Nexios TF Inc.
      </a>
    </div>

  </div>
</div>

<script>
  // Sélection de plan : mise à jour du champ caché + style
  document.querySelectorAll(".plan-card:not(.plan-card-disabled)").forEach(card => {
    card.addEventListener("click", function() {
      const plan = this.dataset.plan;
      document.getElementById("plan-hidden").value = plan;
      document.querySelectorAll(".plan-card").forEach(c => c.classList.remove("selected"));
      this.classList.add("selected");
      const radio = this.querySelector("input[type=radio]");
      if (radio) radio.checked = true;
      // Adapter le texte du bouton
      const btn = document.getElementById("submit-btn");
      if (plan === "trial") {
        btn.textContent = "Créer mon compte — Essai gratuit";
      } else if (plan === "mensuel") {
        btn.textContent = "Créer mon compte — Continuer vers le paiement";
      } else if (plan === "annuel") {
        btn.textContent = "Créer mon compte — Continuer vers le paiement";
      }
    });
  });

  // Validation côté client
  document.getElementById("signup-form").addEventListener("submit", function(e) {
    const p1 = document.getElementById("password").value;
    const p2 = document.getElementById("password2").value;
    if (p1 !== p2) {
      e.preventDefault();
      alert("Les mots de passe ne correspondent pas.");
      document.getElementById("password2").focus();
      return;
    }
    if (!document.getElementById("accept_cgu").checked) {
      e.preventDefault();
      alert("Vous devez accepter les Conditions Générales d'Utilisation et la Politique de confidentialité pour créer un compte.");
      document.getElementById("accept_cgu").focus();
    }
  });
</script>
<script src="/static/js/i18n.js"></script>
</body>
</html>
