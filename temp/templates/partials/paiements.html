<!-- Section Paiements -->
<div class="section-header">
  <h2 class="section-title" data-i18n="pay.title">Paiements &amp; Dettes</h2>
  <button class="btn btn-primary btn-sm" onclick="openAddPaiement()">
    + <span data-i18n="btn.add">Ajouter</span>
  </button>
</div>

<!-- Tableau des paiements réguliers -->
<div class="card mb-2">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-i18n="pay.name">Nom</th>
          <th data-i18n="pay.amount">Montant</th>
          <th data-i18n="pay.frequency">Fréquence</th>
          <th>Méthode</th>
          <th data-i18n="pay.next_date">Prochaine échéance</th>
          <th data-i18n="pay.reminder">Rappel</th>
          <th data-i18n="pay.actions">Actions</th>
        </tr>
      </thead>
      <tbody id="pay-tbody">
        <tr><td colspan="7" class="text-center text-muted" style="padding:2rem">Chargement...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Sous-section Dettes actives -->
<div id="debt-section" style="display:none">
  <div class="section-header mt-3">
    <h3 class="section-title" data-i18n="pay.debts_title">Dettes actives</h3>
  </div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-i18n="pay.name">Nom</th>
            <th data-i18n="pay.amount">Paiement</th>
            <th data-i18n="pay.frequency">Fréquence</th>
            <th data-i18n="pay.next_date">Prochaine échéance</th>
            <th data-i18n="pay.total_debt">Total dette</th>
            <th data-i18n="pay.remaining">Restant / Progression</th>
            <th data-i18n="pay.actions">Actions</th>
          </tr>
        </thead>
        <tbody id="debt-tbody">
          <tr><td colspan="7" class="text-center text-muted" style="padding:2rem">—</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Export CSV paiements -->
<div class="mt-2" style="text-align:right">
  <a href="/export/csv/paiements" class="btn btn-ghost btn-sm">
    📊 <span data-i18n="btn.export_csv">Export CSV</span>
  </a>
</div>
