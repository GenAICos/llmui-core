<!-- Section Dépenses mensuelles -->
<div class="section-header">
  <h2 class="section-title" data-i18n="exp.title">Dépenses mensuelles</h2>
  <button class="btn btn-primary btn-sm" onclick="openAddDepense()">
    + <span data-i18n="btn.add">Ajouter</span>
  </button>
</div>

<!-- Filtres mois / année -->
<div class="filter-bar">
  <select id="filter-mois" style="width:auto">
    <option value="1"  data-i18n="month.1">Janvier</option>
    <option value="2"  data-i18n="month.2">Février</option>
    <option value="3"  data-i18n="month.3">Mars</option>
    <option value="4"  data-i18n="month.4">Avril</option>
    <option value="5"  data-i18n="month.5">Mai</option>
    <option value="6"  data-i18n="month.6">Juin</option>
    <option value="7"  data-i18n="month.7">Juillet</option>
    <option value="8"  data-i18n="month.8">Août</option>
    <option value="9"  data-i18n="month.9">Septembre</option>
    <option value="10" data-i18n="month.10">Octobre</option>
    <option value="11" data-i18n="month.11">Novembre</option>
    <option value="12" data-i18n="month.12">Décembre</option>
  </select>
  <input type="number" id="filter-annee" style="width:90px" min="2000" max="2099">
</div>

<!-- Tableau des dépenses -->
<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-i18n="exp.date">Date</th>
          <th data-i18n="exp.name">Libellé</th>
          <th data-i18n="exp.category">Catégorie</th>
          <th data-i18n="exp.note">Note</th>
          <th class="text-right" data-i18n="exp.amount">Montant</th>
          <th data-i18n="pay.actions">Actions</th>
        </tr>
      </thead>
      <tbody id="exp-tbody">
        <tr><td colspan="6" class="text-center text-muted" style="padding:2rem">Chargement...</td></tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="3"></td>
          <td class="text-right" style="font-weight:700;color:var(--text-muted);font-size:0.85rem" data-i18n="exp.total">Total du mois</td>
          <td class="text-right" style="font-weight:800;font-size:1.1rem" id="exp-total">—</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<!-- Exports CSV -->
<div class="mt-2" style="text-align:right">
  <a href="/export/csv/depenses" class="btn btn-ghost btn-sm">
    📊 <span data-i18n="btn.export_csv">Export CSV</span>
  </a>
</div>

<!-- ── Budgets par catégorie ───────────────────────────────────────────── -->
<div class="section-header mt-3">
  <h2 class="section-title" data-i18n="budget.cat_title">Budgets par catégorie</h2>
  <button class="btn btn-primary btn-sm" onclick="openAddBudgetCat()">
    + <span data-i18n="budget.add_cat">Ajouter catégorie</span>
  </button>
</div>

<div id="budget-cat-list" class="budget-cat-grid">
  <!-- Chargement dynamique -->
</div>
