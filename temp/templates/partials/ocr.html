<!-- ── OCR Factures ────────────────────────────────────────────────────── -->
<div class="section-header">
  <h2 data-i18n="ocr.title">Scanner une facture</h2>
  <button class="btn btn-primary btn-sm" onclick="openOcrUpload()" data-i18n="ocr.btn_scan">
    📷 Scanner
  </button>
</div>

<!-- Zone de dépôt -->
<div id="ocr-dropzone" class="ocr-dropzone"
     onclick="document.getElementById('ocr-file-input').click()"
     ondragover="event.preventDefault(); this.classList.add('drag-over')"
     ondragleave="this.classList.remove('drag-over')"
     ondrop="ocrHandleDrop(event)">
  <div class="ocr-dropzone-icon">🧾</div>
  <p class="ocr-dropzone-text" data-i18n="ocr.drop_hint">
    Glissez une facture ici ou cliquez pour sélectionner
  </p>
  <p class="text-muted" style="font-size:0.8rem">JPG · PNG · WebP · PDF — max 10 Mo</p>
  <input type="file" id="ocr-file-input" accept=".jpg,.jpeg,.png,.webp,.pdf"
         style="display:none" onchange="ocrHandleFile(this.files[0])">
</div>

<!-- Résultat de l'analyse (caché par défaut) -->
<div id="ocr-result-panel" class="ocr-result-panel" style="display:none">
  <div class="ocr-result-header">
    <span data-i18n="ocr.result_title">Données extraites</span>
    <span id="ocr-result-filename" class="text-muted" style="font-size:0.8rem"></span>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem">
    <div class="form-group">
      <label data-i18n="exp.name">Libellé</label>
      <input type="text" id="ocr-nom" maxlength="255">
    </div>
    <div class="form-group">
      <label data-i18n="exp.amount">Montant</label>
      <input type="number" id="ocr-montant" step="0.01" min="0.01">
    </div>
    <div class="form-group">
      <label data-i18n="exp.date">Date</label>
      <input type="date" id="ocr-date">
    </div>
    <div class="form-group">
      <label data-i18n="exp.category">Catégorie</label>
      <select id="ocr-categorie">
        <option value="Épicerie">Épicerie</option>
        <option value="Restaurant">Restaurant</option>
        <option value="Dépanneur">Dépanneur</option>
        <option value="Essence">Essence</option>
        <option value="Auto">Auto</option>
        <option value="Transport">Transport</option>
        <option value="Vêtements">Vêtements</option>
        <option value="Santé">Santé</option>
        <option value="Loisirs">Loisirs</option>
        <option value="Abonnements">Abonnements</option>
        <option value="Services publics">Services publics</option>
        <option value="Logement">Logement</option>
        <option value="Autre" selected>Autre</option>
      </select>
    </div>
  </div>
  <input type="hidden" id="ocr-facture-id">

  <div class="ocr-result-actions">
    <button class="btn btn-ghost btn-sm" onclick="ocrReset()" data-i18n="btn.cancel">Annuler</button>
    <button class="btn btn-primary" onclick="ocrConfirmer()" data-i18n="ocr.btn_confirm">
      ✅ Enregistrer comme dépense
    </button>
  </div>
</div>

<!-- Loading spinner -->
<div id="ocr-loading" style="display:none;text-align:center;padding:2rem">
  <div class="spinner"></div>
  <p class="text-muted" style="margin-top:0.75rem" data-i18n="ocr.analyzing">
    Analyse en cours…
  </p>
</div>

<!-- ── Historique des factures scannées ─────────────────────────────── -->
<div class="section-header" style="margin-top:2.5rem">
  <h3 data-i18n="ocr.history_title">Historique des scans</h3>
</div>

<div id="ocr-history-list">
  <p class="empty-state" data-i18n="ocr.history_empty">Aucune facture scannée.</p>
</div>
