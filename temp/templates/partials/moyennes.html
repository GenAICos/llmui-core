<!-- Section Moyennes -->
<div class="section-header">
  <h2 class="section-title" data-i18n="avg.title">Moyennes de dépenses</h2>
</div>

<!-- Sélecteur de période d'analyse -->
<div class="filter-bar mb-2">
  <span class="text-muted" style="font-size:0.85rem" data-i18n="avg.period">Analyser sur :</span>
  <button class="btn btn-ghost btn-sm avg-period-btn" data-mois="3"  data-i18n="avg.3m">3 mois</button>
  <button class="btn btn-ghost btn-sm avg-period-btn" data-mois="6"  data-i18n="avg.6m">6 mois</button>
  <button class="btn btn-primary btn-sm avg-period-btn" data-mois="12" data-i18n="avg.12m">12 mois</button>
  <button class="btn btn-ghost btn-sm avg-period-btn" data-mois="0"  data-i18n="avg.all">Tout</button>
</div>

<!-- Tableau par dépense -->
<div class="card mb-2">
  <h4 class="mb-1" data-i18n="avg.name">Par dépense</h4>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-i18n="avg.name">Dépense</th>
          <th data-i18n="exp.category">Catégorie</th>
          <th class="text-center" data-i18n="avg.occurrences">Occ.</th>
          <th class="text-right" data-i18n="avg.average">Moyenne</th>
          <th class="text-right" data-i18n="avg.min">Min</th>
          <th class="text-right" data-i18n="avg.max">Max</th>
          <th data-i18n="avg.trend">Tendance</th>
        </tr>
      </thead>
      <tbody id="avg-tbody">
        <tr><td colspan="7" class="text-center text-muted" style="padding:2rem">Chargement...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Tableau par catégorie -->
<div class="card">
  <h4 class="mb-1" data-i18n="avg.by_cat">Par catégorie</h4>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-i18n="exp.category">Catégorie</th>
          <th class="text-center" data-i18n="avg.occurrences">Occ.</th>
          <th class="text-right" data-i18n="avg.average">Moyenne</th>
          <th class="text-right" data-i18n="avg.total">Total</th>
        </tr>
      </thead>
      <tbody id="avg-cat-tbody">
        <tr><td colspan="4" class="text-center text-muted" style="padding:2rem">—</td></tr>
      </tbody>
    </table>
  </div>
</div>
