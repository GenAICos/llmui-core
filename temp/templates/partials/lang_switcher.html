<!-- Sélecteur de langue réutilisable — pages d'authentification.
     Le changement de langue est géré par /static/js/i18n.js (qui câble les
     .lang-btn et met à jour #lang-current). Ce composant ne gère que
     l'ouverture/fermeture du menu déroulant. Réutilise les classes
     .lang-dropdown / .lang-menu / .lang-btn définies dans style.css. -->
<div class="lang-switch-auth">
  <div class="lang-dropdown">
    <button type="button" class="lang-dropdown-toggle" id="lang-toggle-btn"
            onclick="toggleAuthLangMenu()" aria-haspopup="true" aria-expanded="false">
      <span id="lang-current">🇫🇷 FR</span> ▾
    </button>
    <div class="lang-menu" id="lang-menu" role="menu">
      <button type="button" class="lang-btn" data-lang="fr" role="menuitem">🇫🇷 Français</button>
      <button type="button" class="lang-btn" data-lang="en" role="menuitem">🇬🇧 English</button>
      <button type="button" class="lang-btn" data-lang="es" role="menuitem">🇪🇸 Español</button>
      <button type="button" class="lang-btn" data-lang="de" role="menuitem">🇩🇪 Deutsch</button>
      <button type="button" class="lang-btn" data-lang="pt" role="menuitem">🇧🇷 Português</button>
      <button type="button" class="lang-btn" data-lang="hi" role="menuitem">🇮🇳 हिन्दी</button>
    </div>
  </div>
</div>

<script>
  function toggleAuthLangMenu() {
    var menu = document.getElementById("lang-menu");
    var btn  = document.getElementById("lang-toggle-btn");
    var open = menu.classList.toggle("open");
    if (btn) btn.setAttribute("aria-expanded", open ? "true" : "false");
  }
  // Fermer le menu si clic en dehors du sélecteur
  document.addEventListener("click", function(e) {
    var dd   = document.querySelector(".lang-switch-auth .lang-dropdown");
    var menu = document.getElementById("lang-menu");
    if (dd && menu && !dd.contains(e.target)) {
      menu.classList.remove("open");
      var btn = document.getElementById("lang-toggle-btn");
      if (btn) btn.setAttribute("aria-expanded", "false");
    }
  });
  // Fermer le menu après le choix d'une langue (i18n.js applique le changement)
  document.querySelectorAll(".lang-switch-auth .lang-btn").forEach(function(b) {
    b.addEventListener("click", function() {
      document.getElementById("lang-menu").classList.remove("open");
    });
  });
</script>
