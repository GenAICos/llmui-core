<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LLMUI Notifications</title>

  <link rel="manifest" href="/notify/manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Notifs" />
  <link rel="apple-touch-icon" href="/notify/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/notify/icon-192.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #6366f1;
      --primary-dark: #4f46e5;
      --primary-light:#818cf8;
      --bg-base:      #0f0f13;
      --bg-surface:   #1a1a24;
      --bg-card:      #22223a;
      --border:       #2d2d45;
      --text:         #e8e8f0;
      --text-muted:   #8888a8;
      --radius:       0.75rem;
      --radius-sm:    0.375rem;
      --green:        #22c55e;
      --red:          #ef4444;
      --amber:        #f59e0b;
      --blue:         #3b82f6;
    }

    html, body { height: 100%; background: var(--bg-base); color: var(--text); font-family: system-ui, sans-serif; }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 1rem env(safe-area-inset-top, 0);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    header img { width: 28px; height: 28px; object-fit: contain; }
    header h1 { font-size: 1rem; font-weight: 700; flex: 1; }
    #unread-badge {
      background: var(--primary); color: #fff; font-size: 0.7rem; font-weight: 700;
      padding: 0.15rem 0.5rem; border-radius: 99px; min-width: 1.4rem; text-align: center;
      display: none;
    }
    #unread-badge.visible { display: inline-block; }
    .header-btn {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      font-size: 1.1rem; padding: 0.3rem; border-radius: var(--radius-sm);
      transition: color 150ms;
    }
    .header-btn:hover { color: var(--text); }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed; inset: 0; background: var(--bg-base);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; padding: 2rem; z-index: 100;
    }
    #login-overlay.hidden { display: none; }
    #login-overlay img { width: 72px; margin-bottom: 0.5rem; }
    #login-overlay h2 { font-size: 1.1rem; text-align: center; }
    .field { display: flex; flex-direction: column; gap: 0.35rem; width: 100%; max-width: 320px; }
    .field label { font-size: 0.8rem; color: var(--text-muted); }
    .field input {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); padding: 0.6rem 0.75rem; font-size: 0.9rem; outline: none; width: 100%;
    }
    .field input:focus { border-color: var(--primary); }
    .btn-primary {
      background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm);
      padding: 0.65rem 1.5rem; font-size: 0.9rem; font-weight: 600; cursor: pointer;
      width: 100%; max-width: 320px; transition: background 150ms;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    #login-error { color: var(--red); font-size: 0.82rem; text-align: center; min-height: 1.1rem; }

    /* ── Tabs ── */
    nav {
      display: flex; background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1; background: none; border: none; cursor: pointer;
      padding: 0.65rem 0.5rem; font-size: 0.8rem; color: var(--text-muted);
      border-bottom: 2px solid transparent; transition: color 150ms, border-color 150ms;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── Notification list ── */
    #notif-list { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
    #notif-list::-webkit-scrollbar { width: 4px; }
    #notif-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .notif-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 60%; gap: 0.5rem; color: var(--text-muted); font-size: 0.85rem;
      opacity: 0.5;
    }
    .notif-empty span { font-size: 2.5rem; }

    .notif-card {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 100ms;
      position: relative;
    }
    .notif-card:hover { background: var(--bg-surface); }
    .notif-card.unread { background: color-mix(in srgb, var(--primary) 5%, var(--bg-base)); }
    .notif-card.unread::before {
      content: '';
      position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 60%; background: var(--primary); border-radius: 0 2px 2px 0;
    }
    .notif-card.expanded { background: var(--bg-surface); }

    .notif-header { display: flex; align-items: flex-start; gap: 0.65rem; }
    .notif-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; background: var(--bg-card);
    }
    .notif-avatar.andy { background: color-mix(in srgb, var(--primary) 20%, var(--bg-card)); }
    .notif-avatar.admin { background: color-mix(in srgb, var(--blue) 20%, var(--bg-card)); }
    .notif-meta { flex: 1; min-width: 0; }
    .notif-title {
      font-size: 0.85rem; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .notif-card.unread .notif-title { color: var(--text); }
    .notif-preview {
      font-size: 0.77rem; color: var(--text-muted); margin-top: 0.15rem;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .notif-time { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }

    /* Expanded body */
    .notif-body-wrap { display: none; margin-top: 0.65rem; padding-left: 2.65rem; }
    .notif-card.expanded .notif-body-wrap { display: block; }
    .notif-full-body {
      font-size: 0.82rem; color: var(--text); line-height: 1.55;
      white-space: pre-wrap; word-break: break-word;
      background: var(--bg-card); padding: 0.65rem 0.75rem;
      border-radius: var(--radius-sm); border: 1px solid var(--border);
    }
    .notif-reply-form { margin-top: 0.65rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .notif-reply-label { font-size: 0.75rem; color: var(--primary-light); font-weight: 500; }
    .notif-reply-input {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      padding: 0.55rem 0.7rem; font-size: 0.82rem; resize: vertical;
      min-height: 70px; outline: none; width: 100%; font-family: inherit;
    }
    .notif-reply-input:focus { border-color: var(--primary); }
    .notif-reply-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .btn-sm {
      border: none; border-radius: var(--radius-sm); padding: 0.4rem 0.85rem;
      font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: opacity 150ms;
    }
    .btn-sm:hover { opacity: 0.85; }
    .btn-send { background: var(--primary); color: #fff; }
    .btn-cancel-reply { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border); }
    .reply-sent-badge {
      font-size: 0.75rem; color: var(--green);
      background: color-mix(in srgb, var(--green) 12%, var(--bg-card));
      padding: 0.3rem 0.6rem; border-radius: var(--radius-sm);
    }

    /* ── Type badges ── */
    .notif-type-badge {
      font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 99px;
      font-weight: 700; margin-left: 0.4rem; vertical-align: middle; flex-shrink: 0;
    }
    .badge-task_complete { background: color-mix(in srgb,var(--green) 18%,transparent); color: var(--green); }
    .badge-task_failed   { background: color-mix(in srgb,var(--red) 18%,transparent); color: var(--red); }
    .badge-reply_needed  { background: color-mix(in srgb,var(--amber) 18%,transparent); color: var(--amber); }
    .badge-message       { background: color-mix(in srgb,var(--primary) 18%,transparent); color: var(--primary-light); }
    .badge-alert         { background: color-mix(in srgb,var(--red) 18%,transparent); color: var(--red); }

    /* ── Footer toolbar ── */
    footer {
      background: var(--bg-surface); border-top: 1px solid var(--border);
      padding: 0.5rem 1rem calc(0.5rem + env(safe-area-inset-bottom));
      display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem;
    }
    #push-status { flex: 1; color: var(--text-muted); }
    #push-status.granted { color: var(--green); }
    #push-status.denied  { color: var(--red); }
    .footer-btn {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 0.3rem 0.7rem;
      font-size: 0.73rem; cursor: pointer; color: var(--text-muted);
      transition: color 150ms, border-color 150ms;
    }
    .footer-btn:hover { color: var(--text); border-color: var(--primary); }
    .footer-btn.active { color: var(--primary); border-color: var(--primary); }

    /* ── Bannière install ── */
    #install-bar {
      background: #1e1e2e; border-top: 1px solid #3b3b5c;
      padding: .55rem 1rem; display: flex; align-items: center;
      gap: .55rem; font-size: .8rem; color: #cdd6f4; flex-shrink: 0;
    }
    #install-bar-text { flex: 1; }
    #install-bar-btn {
      background: var(--primary); color: #fff; border: none; border-radius: .35rem;
      padding: .3rem .7rem; font-size: .77rem; font-weight: 600; cursor: pointer;
    }
    #install-bar-btn:hover { background: var(--primary-dark); }
    #install-bar-close {
      background: none; border: none; color: #666; cursor: pointer; font-size: .9rem; padding: .1rem;
    }
    /* Toast iOS */
    #ios-install-toast {
      position: fixed; bottom: 5.5rem; left: 50%; transform: translateX(-50%);
      background: #1e1e2e; border: 1px solid var(--primary);
      border-radius: .6rem; padding: .85rem 1rem; font-size: .8rem; color: #cdd6f4;
      line-height: 1.55; z-index: 200; width: min(310px, 92vw);
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
    }
    #ios-install-toast p { margin-bottom: .3rem; }
    #ios-install-toast strong { color: #fff; }
    #ios-toast-close {
      float: right; background: none; border: none; color: #888; cursor: pointer;
      font-size: .9rem; margin-top: -.15rem;
    }
    /* ── Loading spinner ── */
    .spinner {
      width: 1.1rem; height: 1.1rem; border: 2px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 2rem auto; display: block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">
  <!-- Login overlay -->
  <div id="login-overlay">
    <img src="/notify/logoLLMUI.png" alt="LLMUI" />
    <h2>Connexion — Notifications</h2>
    <div class="field">
      <label>Email</label>
      <input type="email" id="ln-email" autocomplete="email" placeholder="votre@email.com" />
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="ln-pass" autocomplete="current-password" placeholder="••••••••" />
    </div>
    <div id="login-totp-wrap" class="field" style="display:none">
      <label>Code TOTP (6 chiffres)</label>
      <input type="text" id="ln-totp" inputmode="numeric" maxlength="6" placeholder="123456" />
    </div>
    <div id="login-error"></div>
    <button class="btn-primary" id="ln-submit">Se connecter</button>
  </div>

  <!-- Header -->
  <header>
    <img src="/notify/logoLLMUI.png" alt="LLMUI" />
    <h1>Notifications</h1>
    <span id="unread-badge">0</span>
    <button class="header-btn" id="mark-all-btn" title="Tout marquer comme lu">✓</button>
    <button class="header-btn" id="logout-btn" title="Déconnexion">⏏</button>
  </header>

  <!-- Tabs -->
  <nav>
    <button class="tab-btn active" data-filter="all">Toutes</button>
    <button class="tab-btn" data-filter="unread">Non lues</button>
    <button class="tab-btn" data-filter="reply_needed">À répondre</button>
  </nav>

  <!-- List -->
  <div id="notif-list"></div>

  <!-- Bannière install -->
  <div id="install-bar" style="display:none">
    <span id="install-bar-text">📲 Installer l'app</span>
    <button id="install-bar-btn">Installer</button>
    <button id="install-bar-close">✕</button>
  </div>

  <!-- Toast iOS -->
  <div id="ios-install-toast" style="display:none">
    <button id="ios-toast-close">✕</button>
    <p><strong>Installer sur iOS :</strong></p>
    <p>1. Appuyez sur <strong>⬆ Partager</strong> (bas de Safari)</p>
    <p>2. Choisissez <strong>« Sur l'écran d'accueil »</strong></p>
    <p>3. Appuyez sur <strong>Ajouter</strong></p>
  </div>

  <!-- Footer -->
  <footer>
    <span id="push-status">Push : inconnu</span>
    <button class="footer-btn" id="push-btn">Activer push</button>
  </footer>
</div>

<script>
'use strict';

const API = '/api';
let _token = localStorage.getItem('notify_access_token') || '';
let _refresh = localStorage.getItem('notify_refresh_token') || '';
let _tempToken = '';
let _filter = 'all';
let _pollTimer = null;
let _vapidKey = '';
let _deferredInstall = null;

// ── Utils ─────────────────────────────────────────────────────────────────────

function _esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function _relTime(iso) {
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 60) return 'À l\'instant';
  if (diff < 3600) return `${Math.floor(diff/60)} min`;
  if (diff < 86400) return `${Math.floor(diff/3600)} h`;
  return `${Math.floor(diff/86400)} j`;
}

function _jwtExpired(t) {
  try {
    const p = JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    return !p.exp || Date.now()/1000 > p.exp;
  } catch { return true; }
}

async function _apiFetch(path, opts = {}) {
  if (!_token || _jwtExpired(_token)) {
    const ok = await _refreshToken();
    if (!ok) { showLogin(); return null; }
  }
  const headers = { ...(opts.headers || {}), Authorization: `Bearer ${_token}` };
  const res = await fetch(`${API}${path}`, { ...opts, headers });
  if (res.status === 401) {
    const ok = await _refreshToken();
    if (!ok) { showLogin(); return null; }
    const h2 = { ...(opts.headers || {}), Authorization: `Bearer ${_token}` };
    return fetch(`${API}${path}`, { ...opts, headers: h2 });
  }
  return res;
}

async function _refreshToken() {
  if (!_refresh) return false;
  try {
    const res = await fetch(`${API}/auth/refresh`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: _refresh }),
    });
    if (!res.ok) return false;
    const d = await res.json();
    _token = d.access_token;
    if (d.refresh_token) { _refresh = d.refresh_token; localStorage.setItem('notify_refresh_token', _refresh); }
    localStorage.setItem('notify_access_token', _token);
    return true;
  } catch { return false; }
}

// ── Auth ──────────────────────────────────────────────────────────────────────

function showLogin() {
  document.getElementById('login-overlay').classList.remove('hidden');
  stopPoll();
}

function showApp() {
  document.getElementById('login-overlay').classList.add('hidden');
  loadNotifications();
  startPoll();
  loadVapidKey();
  checkPushStatus();
}

document.getElementById('ln-submit').addEventListener('click', async () => {
  const email = document.getElementById('ln-email').value.trim();
  const pass  = document.getElementById('ln-pass').value;
  const totp  = document.getElementById('ln-totp').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

  if (!email || !pass) { errEl.textContent = 'Email et mot de passe requis'; return; }

  try {
    if (!_tempToken) {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass }),
      });
      const d = await res.json();
      if (!res.ok) { errEl.textContent = d.detail || 'Erreur connexion'; return; }
      if (d.temp_token) {
        _tempToken = d.temp_token;
        document.getElementById('login-totp-wrap').style.display = '';
        document.getElementById('ln-totp').focus();
        return;
      }
      _token = d.access_token; _refresh = d.refresh_token || '';
    } else {
      // TOTP step
      const res = await fetch(`${API}/auth/totp/validate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ temp_token: _tempToken, totp_code: totp }),
      });
      const d = await res.json();
      if (!res.ok) { errEl.textContent = d.detail || 'Code TOTP invalide'; return; }
      _token = d.access_token; _refresh = d.refresh_token || '';
      _tempToken = '';
    }
    localStorage.setItem('notify_access_token', _token);
    if (_refresh) localStorage.setItem('notify_refresh_token', _refresh);
    showApp();
  } catch { errEl.textContent = 'Erreur réseau'; }
});

['ln-email','ln-pass'].forEach((id, i, arr) => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById(arr[i+1] || 'ln-submit').focus?.() || document.getElementById('ln-submit').click();
  });
});
document.getElementById('ln-totp').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('ln-submit').click(); });

document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('notify_access_token');
  localStorage.removeItem('notify_refresh_token');
  _token = ''; _refresh = '';
  showLogin();
});

// ── Notifications ─────────────────────────────────────────────────────────────

const TYPE_ICON = {
  task_complete: '✅', task_failed: '❌', reply_needed: '💬', message: '📨', alert: '⚠️',
};
const TYPE_LABELS = {
  task_complete: 'Terminé', task_failed: 'Échoué', reply_needed: 'Répondre', message: 'Message', alert: 'Alerte',
};

async function loadNotifications() {
  const list = document.getElementById('notif-list');
  list.innerHTML = '<div class="spinner"></div>';

  const filterParam = _filter === 'unread' ? '&unread_only=true' : '';
  const res = await _apiFetch(`/notifications/?per_page=50${filterParam}`);
  if (!res || !res.ok) { list.innerHTML = ''; return; }
  const data = await res.json();

  // Badge
  const badge = document.getElementById('unread-badge');
  badge.textContent = data.unread;
  badge.classList.toggle('visible', data.unread > 0);

  // Filter client-side for reply_needed
  let items = data.items;
  if (_filter === 'reply_needed') items = items.filter(n => n.type === 'reply_needed');

  list.innerHTML = '';
  if (!items.length) {
    list.innerHTML = `<div class="notif-empty"><span>🔔</span>Aucune notification</div>`;
    return;
  }

  items.forEach(n => list.appendChild(makeCard(n)));
}

function makeCard(n) {
  const card = document.createElement('div');
  card.className = 'notif-card' + (n.is_read ? '' : ' unread');
  card.id = `notif-${n.id}`;
  card.dataset.id = n.id;

  const avatarClass = n.sender_type === 'andy' ? 'andy' : 'admin';
  const avatarIcon  = n.sender_type === 'andy' ? '🤖' : '👤';
  const badge       = `<span class="notif-type-badge badge-${_esc(n.type)}">${_esc(TYPE_LABELS[n.type] || n.type)}</span>`;
  const icon        = TYPE_ICON[n.type] || '📨';

  const repliedHtml = n.reply
    ? `<div class="reply-sent-badge">✓ Répondu : ${_esc(n.reply.slice(0,80))}${n.reply.length>80?'…':''}</div>`
    : (n.type === 'reply_needed' ? `
        <div class="notif-reply-form">
          <div class="notif-reply-label">↩ Votre réponse à Andy</div>
          <textarea class="notif-reply-input" placeholder="Tapez votre réponse ou instruction…"></textarea>
          <div class="notif-reply-actions">
            <button class="btn-sm btn-cancel-reply">Annuler</button>
            <button class="btn-sm btn-send">Envoyer</button>
          </div>
        </div>` : '');

  card.innerHTML = `
    <div class="notif-header">
      <div class="notif-avatar ${avatarClass}">${avatarIcon}</div>
      <div class="notif-meta">
        <div class="notif-title">${icon} ${_esc(n.title)}${badge}</div>
        <div class="notif-preview">${_esc(n.body)}</div>
      </div>
      <div class="notif-time">${_relTime(n.created_at)}</div>
    </div>
    <div class="notif-body-wrap">
      <div class="notif-full-body">${_esc(n.body)}</div>
      ${repliedHtml}
    </div>`;

  // Toggle expand + mark read
  card.querySelector('.notif-header').addEventListener('click', async () => {
    card.classList.toggle('expanded');
    if (!n.is_read) {
      n.is_read = true;
      card.classList.remove('unread');
      await _apiFetch(`/notifications/${n.id}/read`, { method: 'PATCH' });
      refreshBadge();
    }
  });

  // Reply form
  const sendBtn = card.querySelector('.btn-send');
  const cancelBtn = card.querySelector('.btn-cancel-reply');
  if (sendBtn) {
    sendBtn.addEventListener('click', async () => {
      const ta = card.querySelector('.notif-reply-input');
      const text = ta.value.trim();
      if (!text) return;
      sendBtn.disabled = true;
      const res = await _apiFetch(`/notifications/${n.id}/reply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reply: text }),
      });
      if (res && res.ok) {
        const form = card.querySelector('.notif-reply-form');
        form.innerHTML = `<div class="reply-sent-badge">✓ Réponse envoyée à Andy</div>`;
        n.reply = text;
      }
      sendBtn.disabled = false;
    });
    cancelBtn?.addEventListener('click', () => card.classList.remove('expanded'));
  }

  return card;
}

async function refreshBadge() {
  const res = await _apiFetch('/notifications/unread-count');
  if (!res || !res.ok) return;
  const d = await res.json();
  const badge = document.getElementById('unread-badge');
  badge.textContent = d.unread;
  badge.classList.toggle('visible', d.unread > 0);
}

// ── Tabs ──────────────────────────────────────────────────────────────────────

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _filter = btn.dataset.filter;
    loadNotifications();
  });
});

document.getElementById('mark-all-btn').addEventListener('click', async () => {
  await _apiFetch('/notifications/read-all', { method: 'PATCH' });
  loadNotifications();
});

// ── Push Notifications ────────────────────────────────────────────────────────

async function loadVapidKey() {
  try {
    const res = await _apiFetch('/notifications/vapid-public-key');
    if (res && res.ok) {
      const d = await res.json();
      _vapidKey = d.public_key;
    }
  } catch {}
}

function _b64ToUint8(base64) {
  const raw = atob(base64.replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function subscribePush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    alert('Les notifications push ne sont pas supportées par ce navigateur.');
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') {
    updatePushStatus('denied');
    return;
  }
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: _b64ToUint8(_vapidKey),
    });
    const j = sub.toJSON();
    await _apiFetch('/notifications/push/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        endpoint: j.endpoint,
        p256dh: j.keys.p256dh,
        auth: j.keys.auth,
      }),
    });
    updatePushStatus('granted');
  } catch (e) {
    console.error('Push subscribe error', e);
  }
}

async function checkPushStatus() {
  if (!('Notification' in window)) return;
  const status = Notification.permission;
  updatePushStatus(status);
  if (status === 'granted') {
    // Vérifier si une souscription active existe
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (!sub && _vapidKey) await subscribePush();
    } catch {}
  }
}

function updatePushStatus(status) {
  const el = document.getElementById('push-status');
  const btn = document.getElementById('push-btn');
  if (status === 'granted') {
    el.textContent = '🔔 Push activé';
    el.className = 'granted';
    btn.textContent = 'Désactiver';
    btn.classList.add('active');
  } else if (status === 'denied') {
    el.textContent = '🔕 Push bloqué';
    el.className = 'denied';
    btn.textContent = 'Bloqué';
    btn.disabled = true;
  } else {
    el.textContent = '🔔 Push désactivé';
    el.className = '';
    btn.textContent = 'Activer push';
    btn.classList.remove('active');
  }
}

document.getElementById('push-btn').addEventListener('click', async () => {
  if (Notification.permission === 'granted') {
    // Désabonnement
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        await _apiFetch('/notifications/push/unsubscribe', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: sub.endpoint, p256dh: '', auth: '' }),
        });
        await sub.unsubscribe();
      }
    } catch {}
    updatePushStatus('default');
  } else {
    await subscribePush();
  }
});

// ── Polling ───────────────────────────────────────────────────────────────────

function startPoll() {
  if (_pollTimer) return;
  _pollTimer = setInterval(() => {
    refreshBadge();
    // Actualiser silencieusement si tab visible
    if (!document.hidden) loadNotifications();
  }, 30_000);
}

function stopPoll() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}

// ── Install PWA ───────────────────────────────────────────────────────────────

const _isIOS        = /iP(hone|ad|od)/.test(navigator.userAgent);
const _isStandalone = window.matchMedia('(display-mode: standalone)').matches
                   || navigator.standalone === true;
const _isHTTPS      = location.protocol === 'https:' || location.hostname === 'localhost';
const _installBar   = document.getElementById('install-bar');
const _installBarTxt= document.getElementById('install-bar-text');
const _installBarBtn= document.getElementById('install-bar-btn');
const _iosToast     = document.getElementById('ios-install-toast');

function _showInstallBar(label, hint) {
  if (_isStandalone) return;
  if (localStorage.getItem('notify_install_dismissed') === '1') return;
  if (label) _installBarTxt.textContent = label;
  if (hint)  _installBarBtn.textContent = hint;
  _installBar.style.display = 'flex';
}

document.getElementById('install-bar-close').addEventListener('click', () => {
  _installBar.style.display = 'none';
  localStorage.setItem('notify_install_dismissed', '1');
});

document.getElementById('ios-toast-close').addEventListener('click', () => {
  _iosToast.style.display = 'none';
});

if (_isIOS && !_isStandalone) {
  _showInstallBar('📲 Notifications LLMUI — installer l\'app', 'Comment installer ?');
  _installBarBtn.addEventListener('click', () => {
    _iosToast.style.display = _iosToast.style.display === 'none' ? 'block' : 'none';
  });
} else if (!_isStandalone) {
  if (!_isHTTPS) {
    _showInstallBar('⚠ HTTPS requis pour l\'installation', 'En savoir plus');
    _installBarBtn.addEventListener('click', () =>
      alert('Les PWA nécessitent HTTPS pour être installées sur mobile.\nConnectez-vous via https:// pour activer l\'installation.')
    );
  }
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _deferredInstall = e;
    _showInstallBar('📲 Installer l\'app Notifications', 'Installer');
    _installBarBtn.onclick = async () => {
      if (!_deferredInstall) return;
      _deferredInstall.prompt();
      const { outcome } = await _deferredInstall.userChoice;
      _deferredInstall = null;
      if (outcome === 'accepted') _installBar.style.display = 'none';
    };
  });
}

// ── Service Worker ────────────────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/notify/sw.js', { scope: '/notify/' })
    .then(reg => {
      reg.addEventListener('updatefound', () => reg.installing?.addEventListener('statechange', () => {
        if (reg.installing?.state === 'installed' && navigator.serviceWorker.controller) {
          console.log('[SW] Mise à jour disponible');
        }
      }));
    });

  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'open_notification' && e.data.id) {
      const card = document.getElementById(`notif-${e.data.id}`);
      if (card) { card.scrollIntoView({ behavior: 'smooth' }); card.querySelector('.notif-header')?.click(); }
      else loadNotifications();
    }
  });
}

// ── Visibility ─────────────────────────────────────────────────────────────────

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) loadNotifications();
});

// ── Init ──────────────────────────────────────────────────────────────────────

(async () => {
  if (_token && !_jwtExpired(_token)) {
    showApp();
  } else if (_refresh) {
    const ok = await _refreshToken();
    if (ok) showApp(); else showLogin();
  } else {
    showLogin();
  }
})();
</script>
